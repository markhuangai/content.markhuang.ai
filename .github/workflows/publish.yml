# Compile MDX articles (shiki pre-highlighting), upload content to R2, and trigger revalidation.
#
# Runs on every push to main. Compiles only changed articles for efficiency,
# but always uploads the full article manifest. Knowledge and projects are uploaded
# directly from source manifests/files. After R2 upload, triggers revalidation and
# notifies the backend of newly added articles for auto-newsletter.
#
# Required secrets:
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare account ID
#   CLOUDFLARE_API_TOKEN  — API token (Workers R2 Storage:Edit + Zone Cache Purge)
#   CLOUDFLARE_ZONE_ID    — Zone ID for CDN cache purge
#   R2_BUCKET_NAME        — R2 bucket name (e.g. "content-markhuang-ai")
#   HOOK_BEARER_TOKEN     — Bearer token for backend hook endpoints
#   SITE_URL              — Production site URL (e.g. "https://markhuang.ai")

name: Publish Content

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "blog/**"
      - "knowledge/**"
      - "projects/**"
      - "manuals/**"
      - "scripts/sync-manuals.ts"

concurrency:
  group: publish-content
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: docker-runner
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2 # Need parent commit to detect changed files

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Detect changed articles
        id: changes
        run: |
          # Get changed MDX files and manifest
          CHANGED=$(git diff --name-only --diff-filter=ACMR HEAD~1 HEAD -- 'blog/**/*.mdx' 'blog/manifest.json')

          if [ -z "$CHANGED" ]; then
            echo "No blog content changes detected"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"

          # Extract slugs from changed MDX files (filename without .mdx extension)
          SLUGS=""
          while IFS= read -r file; do
            if [[ "$file" == *.mdx ]]; then
              slug=$(basename "$file" .mdx)
              SLUGS="$SLUGS $slug"
            fi
          done <<< "$CHANGED"

          # If only manifest.json changed (no MDX), compile all
          if [ -z "$SLUGS" ]; then
            echo "compile_mode=all" >> "$GITHUB_OUTPUT"
          else
            echo "compile_mode=changed" >> "$GITHUB_OUTPUT"
            echo "slugs=$SLUGS" >> "$GITHUB_OUTPUT"
          fi

          # Detect newly added MDX files for auto-newsletter
          ADDED=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'blog/**/*.mdx')
          ADDED_SLUGS=""
          while IFS= read -r file; do
            if [[ -n "$file" ]]; then
              slug=$(basename "$file" .mdx)
              ADDED_SLUGS="$ADDED_SLUGS $slug"
            fi
          done <<< "$ADDED"
          echo "added_slugs=$ADDED_SLUGS" >> "$GITHUB_OUTPUT"

          echo "Changed files:"
          echo "$CHANGED"
          echo "Slugs to compile: $SLUGS"
          echo "Newly added slugs: $ADDED_SLUGS"

      - name: Detect knowledge changes
        id: knowledge
        run: |
          CHANGED=$(git diff --name-only --diff-filter=ACMR HEAD~1 HEAD -- 'knowledge/**')
          if [ -z "$CHANGED" ]; then
            echo "No knowledge changes detected"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changed knowledge files:"
            echo "$CHANGED"
          fi

      - name: Detect project changes
        id: projects
        run: |
          CHANGED=$(git diff --name-only --diff-filter=ACMR HEAD~1 HEAD -- 'projects/**')
          if [ -z "$CHANGED" ]; then
            echo "No project changes detected"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changed project files:"
            echo "$CHANGED"
          fi

      - name: Detect manual changes
        id: manuals
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual workflow dispatch: syncing manuals"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED=$(git diff --name-only --diff-filter=ACMR HEAD~1 HEAD -- 'manuals/**' 'scripts/sync-manuals.ts')
          if [ -z "$CHANGED" ]; then
            echo "No manual changes detected"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changed manual files:"
            echo "$CHANGED"
          fi

      - name: Compile articles
        if: steps.changes.outputs.has_changes == 'true'
        env:
          COMPILE_MODE: ${{ steps.changes.outputs.compile_mode }}
          SLUGS: ${{ steps.changes.outputs.slugs }}
        run: |
          if [ "$COMPILE_MODE" = "changed" ]; then
            npm run compile:changed -- $SLUGS
          else
            npm run compile
          fi

      - name: Sync manuals
        if: steps.manuals.outputs.has_changes == 'true'
        run: npm run sync:manuals

      - name: Upload to R2
        if: steps.changes.outputs.has_changes == 'true'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          # Upload articles first, then manifest — avoids a window where
          # the manifest references slugs whose MDX hasn't landed yet.
          if [ -d "dist/articles" ]; then
            for file in dist/articles/*.mdx; do
              [ -f "$file" ] || continue
              npx wrangler r2 object put "${R2_BUCKET_NAME}/articles/$(basename "$file")" \
                --file "$file" --content-type "text/mdx" --remote
            done
          fi

          if [ -f "dist/manifest.json" ]; then
            npx wrangler r2 object put "${R2_BUCKET_NAME}/manifest.json" \
              --file "dist/manifest.json" --content-type "application/json" --remote
          fi

      - name: Upload knowledge to R2
        if: steps.knowledge.outputs.has_changes == 'true'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          if [ -f "knowledge/manifest.json" ]; then
            npx wrangler r2 object put "${R2_BUCKET_NAME}/knowledge/manifest.json" \
              --file "knowledge/manifest.json" --content-type "application/json" --remote
          fi

          for file in knowledge/*.md; do
            [ -f "$file" ] || continue
            npx wrangler r2 object put "${R2_BUCKET_NAME}/knowledge/$(basename "$file")" \
              --file "$file" --content-type "text/markdown" --remote
          done

      - name: Upload projects to R2
        if: steps.projects.outputs.has_changes == 'true'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          npx wrangler r2 object put "${R2_BUCKET_NAME}/projects/manifest.json" \
            --file "projects/manifest.json" --content-type "application/json" --remote

      - name: Upload manuals to R2
        if: steps.manuals.outputs.has_changes == 'true'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          if [ -d "dist/manuals" ]; then
            while IFS= read -r file; do
              rel="${file#dist/manuals/}"
              [ "$rel" = "manifest.json" ] && continue

              case "$file" in
                *.mdx) content_type="text/mdx" ;;
                *.json) content_type="application/json" ;;
                *.png) content_type="image/png" ;;
                *.jpg|*.jpeg) content_type="image/jpeg" ;;
                *.gif) content_type="image/gif" ;;
                *.svg) content_type="image/svg+xml" ;;
                *.webp) content_type="image/webp" ;;
                *) content_type="application/octet-stream" ;;
              esac

              npx wrangler r2 object put "${R2_BUCKET_NAME}/manuals/${rel}" \
                --file "$file" --content-type "$content_type" --remote
            done < <(find dist/manuals -type f | sort)
          fi

          if [ -f "dist/manuals/manifest.json" ]; then
            npx wrangler r2 object put "${R2_BUCKET_NAME}/manuals/manifest.json" \
              --file "dist/manuals/manifest.json" --content-type "application/json" --remote
          fi

      - name: Trigger ISR revalidation
        if: steps.changes.outputs.has_changes == 'true' || steps.projects.outputs.has_changes == 'true' || steps.manuals.outputs.has_changes == 'true'
        env:
          HOOK_TOKEN: ${{ secrets.HOOK_BEARER_TOKEN }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${SITE_URL}/api/v1/hooks/revalidate" \
            -H "Authorization: Bearer ${HOOK_TOKEN}" \
            -H "Content-Type: application/json" \
            --max-time 30)

          echo "ISR revalidation response: ${STATUS}"
          if [ "$STATUS" -ne 200 ]; then
            echo "::warning::ISR revalidation returned ${STATUS}"
          fi

      - name: Purge Cloudflare CDN cache
        if: steps.changes.outputs.has_changes == 'true' || steps.knowledge.outputs.has_changes == 'true' || steps.projects.outputs.has_changes == 'true' || steps.manuals.outputs.has_changes == 'true'
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything": true}' \
            --max-time 30)

          STATUS=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Cloudflare cache purge response: ${STATUS}"
          echo "$BODY"
          if [ "$STATUS" -ne 200 ]; then
            echo "::warning::Cloudflare cache purge returned ${STATUS}"
          fi

      - name: Notify backend of published changes
        if: steps.changes.outputs.has_changes == 'true' || steps.knowledge.outputs.has_changes == 'true'
        env:
          HOOK_TOKEN: ${{ secrets.HOOK_BEARER_TOKEN }}
          SITE_URL: ${{ secrets.SITE_URL }}
          ADDED_SLUGS: ${{ steps.changes.outputs.added_slugs }}
          KNOWLEDGE_CHANGED: ${{ steps.knowledge.outputs.has_changes }}
        run: |
          # Build JSON payload with both article slugs and knowledge flag
          if [ -n "$ADDED_SLUGS" ]; then
            SLUGS_JSON=$(echo "$ADDED_SLUGS" | tr ' ' '\n' | grep -v '^$' | jq -R . | jq -s .)
          else
            SLUGS_JSON="[]"
          fi

          KNOWLEDGE_BOOL="false"
          if [ "$KNOWLEDGE_CHANGED" = "true" ]; then
            KNOWLEDGE_BOOL="true"
          fi

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${SITE_URL}/api/v1/hooks/content-published" \
            -H "Authorization: Bearer ${HOOK_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"added_slugs\": ${SLUGS_JSON}, \"knowledge_changed\": ${KNOWLEDGE_BOOL}}" \
            --max-time 30)

          echo "Content-published hook response: ${STATUS}"
          if [ "$STATUS" -ne 200 ]; then
            echo "::warning::Content-published hook returned ${STATUS}"
          fi
